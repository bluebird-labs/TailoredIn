language: en-US
reviews:
  profile: assertive
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/node_modules/**"
    - "!**/*.lock"
    - "!dist/**"
  finishing_touches:
    docstrings:
      enabled: false

chat:
  auto_reply: true

instructions: |
  This is a TypeScript/Bun monorepo using Onion/DDD architecture with these layers:
  core → domain → application → infrastructure → api/cli/web

  Rules:
  - Flag any import from domain/ or application/ or infrastructure/ in web/ — web can only import from @tailoredin/api/client
  - Flag any import from infrastructure/ in domain/ or application/
  - Flag any 'any' type usage, even in generics or function parameters
  - Flag unused exports or dead code
  - Flag functions over 40 lines or cyclomatic complexity over 5
  - Flag direct DB queries outside of infrastructure/src/repositories/
  - All relative imports in .ts files must use .js extensions (NodeNext resolution)
  - No dotenv — Bun loads .env natively
  - DI framework (@needle-di/core) should only appear in infrastructure/ and composition roots (api/src/, cli/src/)
  - This is a solo project with heavy Claude Code usage — be skeptical of tests that mirror implementation rather than asserting behavior
