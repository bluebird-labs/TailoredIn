name: Setup Node & pnpm
description: Install Node, pnpm, restore cached dependencies, and run pnpm install

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
      shell: bash
